<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HEX Lab - @vsqhwb-30i</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/6714/6714978.png" type="image/png">
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; user-select: none; }
        .main-card { background: #151515; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.8); text-align: center; width: 350px; }
        .color-picker-bar { width: 100%; height: 40px; background: linear-gradient(to right, #ff0000, #000000); border-radius: 10px; margin: 20px 0; cursor: crosshair; border: 2px solid #444; }
        .preview-box { width: 100%; height: 100px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; text-shadow: 1px 1px 3px #000; border: 2px solid #555; transition: 0.3s; }
        input { width: 80%; padding: 12px; background: #222; border: 1px solid #444; color: #00ffcc; border-radius: 8px; font-size: 18px; text-align: center; outline: none; }
        .history { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; max-width: 400px; justify-content: center; }
        .chip { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #444; cursor: pointer; transition: 0.2s; }
        .chip:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 style="color: #ff3333;">HEX Lab</h2>
        <div class="preview-box" id="preview">#FF0000</div>
        <div class="color-picker-bar" id="gradientBar"></div>
        <input type="text" id="hexInput" placeholder="#HEX-CODE" maxlength="7">
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Канал: @vsqhwb-30i</p>
    </div>

    <div class="history" id="history"></div>

    <script>
        const preview = document.getElementById('preview');
        const hexInput = document.getElementById('hexInput');
        const historyContainer = document.getElementById('history');

        // Загрузка истории из памяти при старте
        let savedColors = JSON.parse(localStorage.getItem('myColors')) || [];
        savedColors.forEach(color => renderChip(color));

        function playSound(freq = 440) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        function updateColor(hex, save = true) {
            preview.style.backgroundColor = hex;
            preview.innerText = hex.toUpperCase();
            hexInput.value = hex.toUpperCase();
            if (save) {
                saveToStorage(hex);
                renderChip(hex);
            }
        }

        // Мгновенная работа при вводе
        hexInput.oninput = () => {
            let val = hexInput.value;
            if (!val.startsWith('#')) val = '#' + val;
            hexInput.value = val;
            if (val.length === 7) {
                updateColor(val);
                playSound(600);
            }
        };

        // Клик по градиенту
        document.getElementById('gradientBar').onclick = (e) => {
            const rect = e.target.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const r = Math.round(255 * (1 - percent));
            const hex = "#" + r.toString(16).padStart(2, '0') + "0000";
            updateColor(hex);
            playSound(300 + (percent * 500));
        };

        function saveToStorage(hex) {
            if (!savedColors.includes(hex)) {
                savedColors.unshift(hex);
                if (savedColors.length > 15) savedColors.pop();
                localStorage.setItem('myColors', JSON.stringify(savedColors));
            }
        }

        function renderChip(hex) {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.style.backgroundColor = hex;
            chip.onclick = () => { updateColor(hex, false); playSound(400); };
            historyContainer.prepend(chip);
            if (historyContainer.children.length > 15) historyContainer.lastChild.remove();
        }
    </script>
</body>
</html>
